name: xo_game

version: 1.0.25+41
description: XO Kings - Tic Tac Toe
publish_to: "none"


environment:
  sdk: ">=3.4.0 <4.0.0"

dependencies:
  flutter:
    sdk: flutter
  audioplayers: ^6.0.0
  google_fonts: ^6.2.1
  shared_preferences: ^2.2.3
  intl: ^0.19.0
  url_launcher: ^6.3.0
  firebase_core: ^4.4.0
  firebase_auth: ^6.1.4
  cloud_firestore: ^6.0.2
  connectivity_plus: ^6.0.5
  app_links: ^6.1.1
  in_app_purchase: ^3.1.11
  in_app_purchase_android: ^0.4.0
  crypto: ^3.0.5
  cloud_functions: ^6.0.7
  http: ^1.2.0
  google_sign_in: ^6.2.1
  flutter_signin_button: ^2.0.0
  device_info_plus: ^11.1.0
  image_picker: ^1.1.2
  cached_network_image: ^3.3.1
  firebase_storage: ^13.0.6
  flutter_colorpicker: ^1.1.0

dev_dependencies:
  flutter_launcher_icons: ^0.13.1
  flutter_lints: ^5.0.0

flutter:
  uses-material-design: true

  assets:
    - assets/music/
    - assets/xo.png
    - assets/avatar/
    - assets/game/
    - assets/coin/

  fonts:
    - family: Inter
      fonts:
        - asset: assets/fonts/Inter_18pt-Regular.ttf
          weight: 400
        - asset: assets/fonts/Inter_18pt-Medium.ttf
          weight: 500
        - asset: assets/fonts/Inter_18pt-SemiBold.ttf
          weight: 600
        - asset: assets/fonts/Inter_18pt-Bold.ttf
          weight: 700

    - family: Orbitron
      fonts:
        - asset: assets/fonts/Orbitron-Regular.ttf
          weight: 400
        - asset: assets/fonts/Orbitron-Bold.ttf
          weight: 700
        - asset: assets/fonts/Orbitron-ExtraBold.ttf
          weight: 800
        - asset: assets/fonts/Orbitron-Black.ttf
          weight: 900

flutter_icons:
  android: true
  ios: true
  image_path: "assets/xo.png"
  adaptive_icon_background: "#0A0A0A"
  adaptive_icon_foreground: "assets/xo.png"
