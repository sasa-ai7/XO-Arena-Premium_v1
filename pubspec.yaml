name: xo_arena_neon_clash

version: 1.0.29+54
description: Arena - Premium multi-game neon platform
publish_to: "none"

environment:
  sdk: ">=3.4.0 <4.0.0"

dependencies:
  flutter:
    sdk: flutter
  flutter_localizations:
    sdk: flutter

  # Core
  shared_preferences: ^2.2.3
  intl: ^0.20.2
  url_launcher: ^6.3.0
  connectivity_plus: ^6.0.5
  crypto: ^3.0.5
  device_info_plus: ^11.1.0
  package_info_plus: ^8.0.0

  # Firebase
  firebase_core: ^4.4.0
  firebase_auth: ^6.1.4
  cloud_firestore: ^6.0.2
  cloud_functions: ^6.0.7
  # firebase_storage intentionally removed 2026-05-20 — custom profile photo
  # upload was dropped in favor of Google Sign-In photoURL only.
  # firebase_app_check removed 2026-07-09 — App Check stays disabled
  # (kEnableAppCheck=false) and was never activated; the client-only IAP
  # flow does not depend on it. See lib/main.dart.
  firebase_database: ^12.0.1
  firebase_messaging: ^16.0.0

  # Sharing
  share_plus: ^10.1.2

  # Auth
  google_sign_in: ^6.2.1

  # Payments / IAP
  in_app_purchase: ^3.1.11
  in_app_purchase_android: ^0.4.0

  # UI / Media
  audioplayers: ^6.0.0
  google_fonts: ^6.2.1
  # image_picker intentionally removed 2026-05-20 — only consumer was the
  # custom profile photo upload feature, which now uses Google photoURL only.
  cached_network_image: ^3.3.1

  # Local notifications — foreground display of incoming FCM push messages
  # and the daily 9 PM local play reminder.
  flutter_local_notifications: ^17.2.3
  # Timezone data for daily local scheduling (zonedSchedule requires a
  # TZDateTime). The daily reminder is anchored to the device's current UTC
  # offset, so no device-IANA-name lookup package is needed.
  timezone: ^0.9.4

dev_dependencies:
  flutter_test:
    sdk: flutter
  flutter_launcher_icons: ^0.13.1
  flutter_lints: ^5.0.0

flutter:
  uses-material-design: true

  assets:
    - assets/music/
    - assets/xo.png
    - assets/XO-BACK.png
    - assets/xo.webp
    - assets/avatar/
    - assets/emoji/
    - assets/game/
    - assets/online/
    - assets/coin/
    - assets/x/
    - assets/o/
    - assets/account/
    - assets/moh.png
    - assets/shop.png
    - assets/e1.webp
    - assets/e2.webp
    - assets/e3.webp
    - assets/e4.webp

  fonts:
    - family: Inter
      fonts:
        - asset: assets/fonts/Inter_18pt-Regular.ttf
          weight: 400
        - asset: assets/fonts/Inter_18pt-Medium.ttf
          weight: 500
        - asset: assets/fonts/Inter_18pt-SemiBold.ttf
          weight: 600
        - asset: assets/fonts/Inter_18pt-Bold.ttf
          weight: 700

    - family: Orbitron
      fonts:
        - asset: assets/fonts/Orbitron-Regular.ttf
          weight: 400
        - asset: assets/fonts/Orbitron-Bold.ttf
          weight: 700
        - asset: assets/fonts/Orbitron-ExtraBold.ttf
          weight: 800
        - asset: assets/fonts/Orbitron-Black.ttf
          weight: 900

flutter_icons:
  android: true
  ios: false
  image_path: "assets/xo.png"
  adaptive_icon_background: "#0A0A0A"
  adaptive_icon_foreground: "assets/xo.png"
